<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Product Ad Generator - No Cost, No Limits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .preview-box {
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="text-gray-800">
    <div id="root"></div>

    <script>
        const API_BASE = 'https://vidlab-backend-3za9.onrender.com/';
        
        let currentPage = 'landing';
        let formData = {
            title: '',
            features: '',
            cta: 'Order Now',
            image: null,
            imagePreview: null
        };
        let isGenerating = false;

        async function generateAd() {
            try {
                if (!formData.title || !formData.features || !formData.image) {
                    alert('❌ Please fill all fields and upload an image');
                    return;
                }

                isGenerating = true;
                render();

                const formDataObj = new FormData();
                formDataObj.append('title', formData.title);
                formDataObj.append('features', formData.features);
                formDataObj.append('cta', formData.cta);
                formDataObj.append('image', formData.image);

                console.log('🚀 Sending request to backend...');

                const response = await fetch(`${API_BASE}/generate-ad`, {
                    method: 'POST',
                    body: formDataObj
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Failed to generate ad');
                }

                console.log('✅ Ad generated!', result);
                currentPage = 'success';
                formData.videoUrl = result.video_url;
                isGenerating = false;
                render();

                // Auto-download
                setTimeout(() => {
                    window.location.href = formData.videoUrl;
                }, 2000);

            } catch (error) {
                console.error('❌ Error:', error);
                alert('❌ Error: ' + error.message);
                isGenerating = false;
                render();
            }
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                formData.image = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    formData.imagePreview = event.target.result;
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        function render() {
            const root = document.getElementById('root');

            // Landing Page
            if (currentPage === 'landing') {
                root.innerHTML = `
                    <div class="min-h-screen">
                        <!-- Header -->
                        <nav class="bg-white shadow-lg">
                            <div class="max-w-6xl mx-auto px-8 py-6 flex justify-between items-center">
                                <div class="text-2xl font-bold gradient-text">🎬 AdMaker</div>
                                <button onclick="goTo('generator')" class="px-6 py-2 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-lg font-bold hover:shadow-lg transition">
                                    Create Ad
                                </button>
                            </div>
                        </nav>

                        <!-- Hero -->
                        <div class="max-w-6xl mx-auto px-8 py-24 text-center">
                            <h1 class="text-6xl font-black text-white mb-6">
                                Create Stunning Product Ads
                                <br/>
                                <span class="gradient-text">100% Free Forever</span>
                            </h1>
                            <p class="text-xl text-gray-200 mb-8 max-w-2xl mx-auto">
                                Upload your product image, add features, and get a professional 40-second ad video instantly. No credit card needed. No limits.
                            </p>
                            <button onclick="goTo('generator')" class="px-12 py-4 bg-white text-purple-600 font-bold text-lg rounded-lg hover:shadow-2xl transition inline-block">
                                Start Creating Now →
                            </button>
                        </div>

                        <!-- Features -->
                        <div class="max-w-6xl mx-auto px-8 py-16">
                            <h2 class="text-4xl font-bold text-white text-center mb-16">Why AdMaker?</h2>
                            <div class="grid md:grid-cols-3 gap-8">
                                <div class="bg-white p-8 rounded-lg shadow-lg">
                                    <div class="text-4xl mb-4">💰</div>
                                    <h3 class="text-xl font-bold mb-3">100% Free</h3>
                                    <p class="text-gray-600">No credit card. No hidden fees. No limits.</p>
                                </div>
                                <div class="bg-white p-8 rounded-lg shadow-lg">
                                    <div class="text-4xl mb-4">⚡</div>
                                    <h3 class="text-xl font-bold mb-3">Super Fast</h3>
                                    <p class="text-gray-600">Generate 40-second ads in minutes.</p>
                                </div>
                                <div class="bg-white p-8 rounded-lg shadow-lg">
                                    <div class="text-4xl mb-4">🎨</div>
                                    <h3 class="text-xl font-bold mb-3">Professional Quality</h3>
                                    <p class="text-gray-600">AI voiceover, animations, and effects.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Footer -->
                        <div class="text-center text-white py-8 border-t border-white border-opacity-20">
                            <p>🚀 Completely Open Source & Free</p>
                        </div>
                    </div>
                `;
                return;
            }

            // Generator Page
            if (currentPage === 'generator') {
                root.innerHTML = `
                    <div class="min-h-screen bg-gray-50">
                        <!-- Header -->
                        <nav class="bg-white shadow-lg">
                            <div class="max-w-6xl mx-auto px-8 py-6 flex justify-between items-center">
                                <button onclick="goTo('landing')" class="text-2xl font-bold gradient-text">🎬 AdMaker</button>
                                <button onclick="goTo('landing')" class="text-gray-600 hover:text-gray-900">← Back</button>
                            </div>
                        </nav>

                        <!-- Main Content -->
                        <div class="max-w-6xl mx-auto px-8 py-16">
                            <h1 class="text-4xl font-bold text-center mb-16">Create Your Product Ad</h1>

                            <div class="grid md:grid-cols-2 gap-12">
                                <!-- Form -->
                                <div class="bg-white p-8 rounded-lg shadow-lg">
                                    <h2 class="text-2xl font-bold mb-6">Ad Details</h2>

                                    <div class="space-y-6">
                                        <!-- Product Title -->
                                        <div>
                                            <label class="block text-sm font-bold mb-2">Product Name *</label>
                                            <input type="text" 
                                                placeholder="e.g., Amazing Headphones" 
                                                value="${formData.title}"
                                                onchange="formData.title = this.value"
                                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 outline-none"
                                            />
                                        </div>

                                        <!-- Features -->
                                        <div>
                                            <label class="block text-sm font-bold mb-2">Key Features * (comma separated)</label>
                                            <textarea 
                                                placeholder="e.g., Noise Cancelling, 30hr Battery, Premium Sound"
                                                rows="4"
                                                onchange="formData.features = this.value"
                                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 outline-none resize-none"
                                            >${formData.features}</textarea>
                                        </div>

                                        <!-- CTA -->
                                        <div>
                                            <label class="block text-sm font-bold mb-2">Call to Action</label>
                                            <input type="text" 
                                                placeholder="e.g., Order Now, Buy Today, Get Yours" 
                                                value="${formData.cta}"
                                                onchange="formData.cta = this.value"
                                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 outline-none"
                                            />
                                        </div>

                                        <!-- Image Upload -->
                                        <div>
                                            <label class="block text-sm font-bold mb-2">Product Image *</label>
                                            <div class="border-2 border-dashed border-purple-300 rounded-lg p-8 text-center cursor-pointer hover:border-purple-600 transition">
                                                <input type="file" 
                                                    accept="image/*"
                                                    onchange="handleImageUpload(event)"
                                                    class="hidden"
                                                    id="imageInput"
                                                />
                                                <label for="imageInput" class="cursor-pointer">
                                                    <div class="text-4xl mb-2">📸</div>
                                                    <p class="text-gray-600">Click to upload image</p>
                                                    <p class="text-sm text-gray-500 mt-2">PNG, JPG, WebP</p>
                                                </label>
                                            </div>
                                            ${formData.image ? `<p class="text-green-600 mt-2">✅ ${formData.image.name}</p>` : ''}
                                        </div>

                                        <!-- Generate Button -->
                                        <button 
                                            onclick="generateAd()"
                                            ${isGenerating ? 'disabled' : ''}
                                            class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold text-lg rounded-lg hover:shadow-lg transition ${isGenerating ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}"
                                        >
                                            ${isGenerating ? '<div class="flex items-center justify-center gap-2"><div class="spinner"></div>Creating Your Ad...</div>' : '🎬 Generate 40-Second Ad'}
                                        </button>
                                    </div>
                                </div>

                                <!-- Preview -->
                                <div>
                                    <h2 class="text-2xl font-bold mb-6">Preview</h2>
                                    <div class="preview-box">
                                        ${formData.imagePreview 
                                            ? `<img src="${formData.imagePreview}" class="preview-image" />`
                                            : `<div class="flex items-center justify-center h-full text-white text-center"><div>
                                                <div class="text-6xl mb-4">🖼️</div>
                                                <p>Upload your product image here</p>
                                            </div></div>`
                                        }
                                    </div>

                                    <div class="mt-8 bg-blue-50 p-6 rounded-lg border-l-4 border-blue-500">
                                        <h3 class="font-bold text-blue-900 mb-2">📝 How It Works:</h3>
                                        <ol class="text-sm text-blue-800 space-y-2 list-decimal list-inside">
                                            <li>Upload your product image</li>
                                            <li>Add product name & features</li>
                                            <li>Click Generate</li>
                                            <li>Get a stunning 40-sec ad video</li>
                                            <li>Auto-download ready to share!</li>
                                        </ol>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            // Success Page
            if (currentPage === 'success') {
                root.innerHTML = `
                    <div class="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div class="bg-white rounded-lg shadow-2xl p-12 text-center max-w-md">
                            <div class="text-6xl mb-6">🎉</div>
                            <h1 class="text-3xl font-bold mb-4">Ad Created!</h1>
                            <p class="text-gray-600 mb-8">
                                Your 40-second product ad is ready. Your video is downloading automatically...
                            </p>
                            <div class="space-y-4">
                                <a href="${formData.videoUrl}" class="block py-3 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold rounded-lg hover:shadow-lg transition">
                                    ⬇️ Download Video
                                </a>
                                <button onclick="goTo('generator')" class="w-full py-3 border-2 border-purple-600 text-purple-600 font-bold rounded-lg hover:bg-purple-50 transition">
                                    Create Another Ad
                                </button>
                            </div>

                            <div class="mt-12 pt-8 border-t border-gray-200">
                                <p class="text-sm text-gray-600 mb-4">💡 What to do next:</p>
                                <ul class="text-sm text-gray-600 space-y-2 text-left">
                                    <li>✓ Download your ad</li>
                                    <li>✓ Post on social media (TikTok, Insta, YouTube)</li>
                                    <li>✓ Use in marketing campaigns</li>
                                    <li>✓ Share with your team</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
        }

        function goTo(page) {
            currentPage = page;
            render();
        }

        // Initial render
        render();
    </script>
</body>
</html>

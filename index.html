<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoAI - AI Video Generation Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #fff;
        }
        
        .gradient-text {
            background: linear-gradient(to right, #06b6d4, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hidden {
            display: none;
        }

        .visible {
            display: block;
        }
    </style>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script>
        // App State
        let currentPage = 'landing';
        let user = null;
        let videos = [];
        let activeEditor = null;
        let formData = {};

        function handleSignup(email) {
            user = { email, joined: new Date().toLocaleDateString() };
            currentPage = 'dashboard';
            render();
        }

        function createVideo(type) {
            activeEditor = type;
            formData = {};
            render();
        }

        function saveVideo() {
            const newVideo = {
                id: Date.now(),
                type: activeEditor,
                title: formData.title || `Untitled ${activeEditor}`,
                created: new Date().toLocaleDateString(),
                status: 'processing',
            };
            videos.unshift(newVideo);
            activeEditor = null;
            alert(`Video "${newVideo.title}" queued for generation!`);
            render();
        }

        function render() {
            const root = document.getElementById('root');

            // Landing Page
            if (currentPage === 'landing') {
                root.innerHTML = `
                    <div class="bg-black text-white min-h-screen">
                        <!-- Nav -->
                        <nav class="flex justify-between items-center px-8 py-6 border-b border-gray-800">
                            <div class="flex items-center gap-2 text-2xl font-bold">
                                <span>✨ VideoAI</span>
                            </div>
                            <button onclick="goTo('login')" class="px-6 py-2 bg-cyan-500 text-black font-semibold rounded-lg hover:bg-cyan-400 transition">
                                Sign In
                            </button>
                        </nav>

                        <!-- Hero -->
                        <section class="max-w-6xl mx-auto px-8 py-24">
                            <div class="text-center mb-16">
                                <h1 class="text-6xl font-black mb-6 gradient-text">
                                    Create Studio-Quality Videos in Minutes
                                </h1>
                                <p class="text-xl text-gray-400 mb-8 max-w-2xl mx-auto leading-relaxed">
                                    Transform your ideas into stunning videos with AI. No equipment, no experience needed.
                                </p>
                                <button onclick="goTo('login')" class="px-8 py-4 bg-cyan-500 text-black font-bold text-lg rounded-lg hover:bg-cyan-400 transition inline-flex items-center gap-2">
                                    Start Creating Free →
                                </button>
                            </div>

                            <!-- Features -->
                            <div class="grid md:grid-cols-3 gap-8 mt-24">
                                <div class="bg-gray-900 p-8 rounded-lg border border-gray-800 hover:border-cyan-500 transition">
                                    <div class="text-4xl mb-4">📝</div>
                                    <h3 class="text-xl font-bold mb-3">Text to Video</h3>
                                    <p class="text-gray-400">Describe your vision in words. AI creates the video automatically.</p>
                                </div>

                                <div class="bg-gray-900 p-8 rounded-lg border border-gray-800 hover:border-cyan-500 transition">
                                    <div class="text-4xl mb-4">🖼️</div>
                                    <h3 class="text-xl font-bold mb-3">Image to Video</h3>
                                    <p class="text-gray-400">Upload a photo. We'll animate it with smooth, realistic motion.</p>
                                </div>

                                <div class="bg-gray-900 p-8 rounded-lg border border-gray-800 hover:border-cyan-500 transition">
                                    <div class="text-4xl mb-4">👤</div>
                                    <h3 class="text-xl font-bold mb-3">AI Avatars</h3>
                                    <p class="text-gray-400">Create talking head videos with digital presenters in any language.</p>
                                </div>
                            </div>

                            <!-- Pricing -->
                            <section class="mt-32">
                                <h2 class="text-4xl font-bold text-center mb-16">Simple Pricing</h2>
                                <div class="grid md:grid-cols-3 gap-8">
                                    <div class="p-8 rounded-lg border border-gray-800 bg-gray-950">
                                        <h3 class="text-2xl font-bold mb-2">Starter</h3>
                                        <div class="text-3xl font-bold text-cyan-400 mb-6">Free</div>
                                        <ul class="space-y-3">
                                            <li class="flex items-center gap-3 text-gray-300">✓ 5 videos/month</li>
                                            <li class="flex items-center gap-3 text-gray-300">✓ SD quality</li>
                                            <li class="flex items-center gap-3 text-gray-300">✓ Basic avatars</li>
                                        </ul>
                                        <button class="w-full mt-8 py-3 rounded-lg font-bold border border-gray-700 text-white hover:border-cyan-500 transition">Get Started</button>
                                    </div>

                                    <div class="p-8 rounded-lg border border-cyan-500 bg-gray-900 ring-2 ring-cyan-500">
                                        <h3 class="text-2xl font-bold mb-2">Creator</h3>
                                        <div class="text-3xl font-bold text-cyan-400 mb-6">$29</div>
                                        <ul class="space-y-3">
                                            <li class="flex items-center gap-3 text-gray-300">✓ Unlimited videos</li>
                                            <li class="flex items-center gap-3 text-gray-300">✓ 4K quality</li>
                                            <li class="flex items-center gap-3 text-gray-300">✓ All features</li>
                                            <li class="flex items-center gap-3 text-gray-300">✓ Priority support</li>
                                        </ul>
                                        <button class="w-full mt-8 py-3 rounded-lg font-bold bg-cyan-500 text-black hover:bg-cyan-400 transition">Get Started</button>
                                    </div>

                                    <div class="p-8 rounded-lg border border-gray-800 bg-gray-950">
                                        <h3 class="text-2xl font-bold mb-2">Studio</h3>
                                        <div class="text-3xl font-bold text-cyan-400 mb-6">$99</div>
                                        <ul class="space-y-3">
                                            <li class="flex items-center gap-3 text-gray-300">✓ Custom avatars</li>
                                            <li class="flex items-center gap-3 text-gray-300">✓ API access</li>
                                            <li class="flex items-center gap-3 text-gray-300">✓ Batch processing</li>
                                            <li class="flex items-center gap-3 text-gray-300">✓ Dedicated support</li>
                                        </ul>
                                        <button class="w-full mt-8 py-3 rounded-lg font-bold border border-gray-700 text-white hover:border-cyan-500 transition">Get Started</button>
                                    </div>
                                </div>
                            </section>
                        </section>

                        <!-- Footer -->
                        <footer class="border-t border-gray-800 px-8 py-8 text-center text-gray-500">
                            <p>© 2026 VideoAI. Built for creators.</p>
                        </footer>
                    </div>
                `;
                return;
            }

            // Login
            if (currentPage === 'login') {
                root.innerHTML = `
                    <div class="bg-black text-white min-h-screen flex items-center justify-center">
                        <div class="w-full max-w-md">
                            <div class="text-center mb-12">
                                <div class="flex items-center gap-2 justify-center text-2xl font-bold mb-6">
                                    ✨ VideoAI
                                </div>
                                <h1 class="text-3xl font-bold">Welcome Back</h1>
                            </div>

                            <form onsubmit="handleLogin(event)" class="space-y-4">
                                <input type="email" id="loginEmail" placeholder="your@email.com" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-lg text-white placeholder-gray-500 focus:border-cyan-500 outline-none" required />
                                <input type="password" placeholder="Password" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-lg text-white placeholder-gray-500 focus:border-cyan-500 outline-none" />
                                <button type="submit" class="w-full py-3 bg-cyan-500 text-black font-bold rounded-lg hover:bg-cyan-400 transition">Sign In</button>
                            </form>

                            <p class="text-center text-gray-500 mt-6">
                                Don't have an account? <button class="text-cyan-400 hover:text-cyan-300">Sign up</button>
                            </p>
                        </div>
                    </div>
                `;
                return;
            }

            // Dashboard
            if (currentPage === 'dashboard') {
                root.innerHTML = `
                    <div class="bg-black text-white min-h-screen">
                        <!-- Header -->
                        <div class="border-b border-gray-800 px-8 py-6">
                            <div class="max-w-7xl mx-auto flex justify-between items-center">
                                <div class="flex items-center gap-2 text-2xl font-bold">
                                    ✨ VideoAI
                                </div>
                                <div class="flex items-center gap-6">
                                    <span class="text-gray-400">${user.email}</span>
                                    <button class="text-gray-400 hover:text-white">⚙️</button>
                                </div>
                            </div>
                        </div>

                        <!-- Main Content -->
                        <div class="max-w-7xl mx-auto px-8 py-12">
                            <!-- Create Buttons -->
                            <div class="mb-16">
                                <h2 class="text-3xl font-bold mb-8">Create New Video</h2>
                                <div class="grid md:grid-cols-3 gap-6">
                                    <button onclick="createVideoType('text-to-video')" class="p-8 bg-gray-900 border border-gray-800 rounded-lg hover:border-cyan-500 hover:bg-gray-800 transition text-center">
                                        <div class="text-5xl mb-4">✍️</div>
                                        <h3 class="text-xl font-bold">Text to Video</h3>
                                        <p class="text-gray-500 text-sm mt-2">Describe and create</p>
                                    </button>
                                    <button onclick="createVideoType('image-to-video')" class="p-8 bg-gray-900 border border-gray-800 rounded-lg hover:border-cyan-500 hover:bg-gray-800 transition text-center">
                                        <div class="text-5xl mb-4">🖼️</div>
                                        <h3 class="text-xl font-bold">Image to Video</h3>
                                        <p class="text-gray-500 text-sm mt-2">Upload and animate</p>
                                    </button>
                                    <button onclick="createVideoType('avatar-video')" class="p-8 bg-gray-900 border border-gray-800 rounded-lg hover:border-cyan-500 hover:bg-gray-800 transition text-center">
                                        <div class="text-5xl mb-4">👤</div>
                                        <h3 class="text-xl font-bold">AI Avatar</h3>
                                        <p class="text-gray-500 text-sm mt-2">Script and present</p>
                                    </button>
                                </div>
                            </div>

                            <!-- Recent Videos -->
                            <div>
                                <h2 class="text-3xl font-bold mb-8">Recent Projects</h2>
                                ${videos.length === 0 ? `
                                    <div class="text-center py-16 text-gray-500">
                                        <p class="text-4xl mb-4">▶️</p>
                                        <p>No videos yet. Create your first one!</p>
                                    </div>
                                ` : `
                                    <div class="grid md:grid-cols-4 gap-6">
                                        ${videos.map(video => `
                                            <div class="bg-gray-900 rounded-lg overflow-hidden hover:border-cyan-500 border border-gray-800 transition cursor-pointer">
                                                <div class="aspect-video bg-gray-800 flex items-center justify-center text-4xl">🎬</div>
                                                <div class="p-4">
                                                    <h3 class="font-bold truncate">${video.title}</h3>
                                                    <p class="text-sm text-gray-500">${video.created}</p>
                                                    <div class="mt-2 inline-block px-2 py-1 text-xs rounded bg-yellow-900 text-yellow-200">
                                                        ${video.status}
                                                    </div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            // Video Editors
            if (activeEditor) {
                let fields = [];
                let title = '';

                if (activeEditor === 'text-to-video') {
                    title = 'Text to Video';
                    fields = [
                        { label: 'Video Title', key: 'title', placeholder: 'My awesome video' },
                        { label: 'Prompt', key: 'prompt', placeholder: 'Describe the video you want to create...', textarea: true },
                        { label: 'Duration', key: 'duration', type: 'select', options: ['15s', '30s', '60s'] },
                        { label: 'Style', key: 'style', type: 'select', options: ['Cinematic', 'Realistic', 'Animated', 'Minimal'] }
                    ];
                } else if (activeEditor === 'image-to-video') {
                    title = 'Image to Video';
                    fields = [
                        { label: 'Video Title', key: 'title', placeholder: 'My awesome video' },
                        { label: 'Upload Image', key: 'image', type: 'file' },
                        { label: 'Motion Description', key: 'motion', placeholder: 'Describe how the image should move...', textarea: true },
                        { label: 'Duration', key: 'duration', type: 'select', options: ['15s', '30s', '60s'] }
                    ];
                } else {
                    title = 'AI Avatar Video';
                    fields = [
                        { label: 'Video Title', key: 'title', placeholder: 'My awesome video' },
                        { label: 'Script', key: 'script', placeholder: 'Write your script here...', textarea: true },
                        { label: 'Avatar', key: 'avatar', type: 'select', options: ['Professional', 'Friendly', 'Business', 'Creative'] },
                        { label: 'Voice', key: 'voice', type: 'select', options: ['Male (US)', 'Female (US)', 'Male (UK)', 'Female (UK)'] }
                    ];
                }

                root.innerHTML = `
                    <div class="bg-black text-white min-h-screen">
                        <!-- Header -->
                        <div class="border-b border-gray-800 px-8 py-6 flex justify-between items-center">
                            <h1 class="text-2xl font-bold">${title}</h1>
                            <button onclick="closeEditor()" class="text-gray-400 hover:text-white text-xl">✕</button>
                        </div>

                        <!-- Editor -->
                        <div class="max-w-2xl mx-auto px-8 py-12">
                            <div class="space-y-6">
                                ${fields.map(field => `
                                    <div>
                                        <label class="block text-sm font-semibold mb-3">${field.label}</label>
                                        ${field.type === 'select' ? `
                                            <select onchange="updateForm('${field.key}', this.value)" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-lg text-white focus:border-cyan-500 outline-none">
                                                <option value="">Select ${field.label}</option>
                                                ${field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                                            </select>
                                        ` : field.type === 'file' ? `
                                            <div class="border-2 border-dashed border-gray-800 rounded-lg p-8 text-center hover:border-cyan-500 transition cursor-pointer">
                                                <p class="text-4xl mb-2">📤</p>
                                                <p class="text-gray-400">Click to upload image</p>
                                            </div>
                                        ` : field.textarea ? `
                                            <textarea onchange="updateForm('${field.key}', this.value)" placeholder="${field.placeholder}" rows="6" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-lg text-white placeholder-gray-600 focus:border-cyan-500 outline-none resize-none"></textarea>
                                        ` : `
                                            <input type="text" onchange="updateForm('${field.key}', this.value)" placeholder="${field.placeholder}" class="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-lg text-white placeholder-gray-600 focus:border-cyan-500 outline-none" />
                                        `}
                                    </div>
                                `).join('')}
                            </div>

                            <!-- Actions -->
                            <div class="flex gap-4 mt-12">
                                <button onclick="closeEditor()" class="flex-1 px-6 py-3 border border-gray-800 rounded-lg font-bold hover:border-cyan-500 transition">Cancel</button>
                                <button onclick="finalizeSaveVideo()" class="flex-1 px-6 py-3 bg-cyan-500 text-black rounded-lg font-bold hover:bg-cyan-400 transition inline-flex items-center justify-center gap-2">
                                    ⚡ Generate Video
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
        }

        // Helper functions
        function goTo(page) {
            currentPage = page;
            render();
        }

        function createVideoType(type) {
            activeEditor = type;
            formData = {};
            render();
        }

        function closeEditor() {
            activeEditor = null;
            render();
        }

        function updateForm(key, value) {
            formData[key] = value;
        }

        function finalizeSaveVideo() {
            saveVideo();
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            handleSignup(email);
        }

        // Initial render
        render();
    </script>
</body>
</html>
